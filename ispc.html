<script>
document.addEventListener("DOMContentLoaded", () => {

  /* ================= PARTICLES ================= */
  const pc = document.getElementById('particles');
  const cols = ['#2e565e','#adbbbe','#738589'];
  const pts = [];

  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    const s = Math.random() * 5 + 2;

    Object.assign(el.style, {
      position: 'absolute',
      borderRadius: '50%',
      width: s + 'px',
      height: s + 'px',
      background: cols[Math.floor(Math.random() * cols.length)],
      opacity: Math.random() * 0.5 + 0.15,
      pointerEvents: 'none'
    });

    pc.appendChild(el);

    pts.push({
      el,
      x: Math.random() * 100,
      y: Math.random() * 100,
      speed: Math.random() * 1.5 + 0.4,
      dir: Math.random() * 360
    });
  }

  function animPts() {
    pts.forEach(p => {
      let nx = p.x + Math.cos(p.dir * Math.PI / 180) * p.speed * 0.08;
      let ny = p.y + Math.sin(p.dir * Math.PI / 180) * p.speed * 0.08;

      if (nx <= 0 || nx >= 100) { p.dir = 180 - p.dir; nx = Math.max(0, Math.min(100, nx)); }
      if (ny <= 0 || ny >= 100) { p.dir = -p.dir; ny = Math.max(0, Math.min(100, ny)); }

      p.x = nx;
      p.y = ny;

      p.el.style.left = p.x + '%';
      p.el.style.top = p.y + '%';
    });

    requestAnimationFrame(animPts);
  }
  animPts();

  /* ================= TYPING ================= */
  const L1 = 'Welcome to', L2 = 'ISPC';
  let i1 = 0, i2 = 0;

  const e1 = document.getElementById('heroLine1');
  const e2 = document.getElementById('heroLine2');

  function typeL1() {
    if (!e1) return;
    if (i1 < L1.length) {
      e1.textContent += L1[i1++];
      setTimeout(typeL1, 65);
    } else setTimeout(typeL2, 220);
  }

  function typeL2() {
    if (!e2) return;
    if (i2 < L2.length) {
      e2.textContent += L2[i2++];
      setTimeout(typeL2, 85);
    } else {
      e2.classList.remove('typing');
      e2.classList.add('done');
    }
  }

  setTimeout(typeL1, 500);

  /* ================= DARK MODE ================= */
  const darkBtn = document.getElementById('darkBtn');

  function toggleDark() {
    const root = document.documentElement;
    const isDark = root.getAttribute('data-theme') === 'dark';

    root.setAttribute('data-theme', isDark ? 'light' : 'dark');

    if (darkBtn) {
      darkBtn.innerHTML = isDark
        ? '<i class="fas fa-moon"></i>'
        : '<i class="fas fa-sun"></i>';
    }

    localStorage.setItem('theme', isDark ? 'light' : 'dark');
  }

  window.toggleDark = toggleDark;

  const saved = localStorage.getItem('theme');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    if (darkBtn) darkBtn.innerHTML = '<i class="fas fa-sun"></i>';
  }

  /* ================= REVEAL ================= */
  const revEls = document.querySelectorAll('.reveal');

  const revObs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        revObs.unobserve(e.target);
      }
    });
  }, { threshold: 0.15 });

  revEls.forEach(el => revObs.observe(el));

  /* ================= NAV ================= */
  const mNav = document.getElementById('mobileNav');
  const hbg = document.getElementById('hamburger');

  function toggleNav() {
    mNav?.classList.toggle('open');
    hbg?.classList.toggle('open');
  }

  function closeNav() {
    mNav?.classList.remove('open');
    hbg?.classList.remove('open');
  }

  window.toggleNav = toggleNav;
  window.closeNav = closeNav;

  window.addEventListener('scroll', () => {
    if (mNav?.classList.contains('open')) closeNav();
  });

  /* ================= SIDEBAR ================= */
  const sb = document.getElementById('sidebar');
  const sbo = document.getElementById('sbOverlay');

  function toggleSb() {
    sb?.classList.toggle('open');
    sbo?.classList.toggle('show');
  }

  function closeSb() {
    sb?.classList.remove('open');
    sbo?.classList.remove('show');
  }

  window.toggleSb = toggleSb;
  window.closeSb = closeSb;

  /* ================= COUNTDOWN ================= */
  const eventDate = new Date('March 20, 2026 08:30:00');

  function updateCD() {
    const diff = eventDate - new Date();

    const d = document.getElementById('cdD');
    const h = document.getElementById('cdH');
    const m = document.getElementById('cdM');
    const s = document.getElementById('cdS');

    if (!d || !h || !m || !s) return;

    if (diff <= 0) {
      d.textContent = h.textContent = m.textContent = s.textContent = '0';
      return;
    }

    d.textContent = Math.floor(diff / 86400000);
    h.textContent = Math.floor((diff % 86400000) / 3600000);
    m.textContent = Math.floor((diff % 3600000) / 60000);
    s.textContent = Math.floor((diff % 60000) / 1000);
  }

  updateCD();
  setInterval(updateCD, 1000);

  /* ================= FAQ ================= */
  window.toggleFaq = function (btn) {
    const item = btn.closest('.faq-item');
    const isOpen = item.classList.contains('open');

    document.querySelectorAll('.faq-item.open')
      .forEach(el => el.classList.remove('open'));

    if (!isOpen) item.classList.add('open');
  };

  /* ================= SCROLL UI ================= */
  const pb = document.getElementById('progress-bar');
  const backTop = document.getElementById('back-top');

  window.addEventListener('scroll', () => {
    const scrollTop = window.scrollY;
    const max = document.body.scrollHeight - window.innerHeight;

    if (pb) pb.style.width = (scrollTop / max * 100) + '%';

    if (backTop) {
      backTop.classList.toggle('show', scrollTop > 400);
    }
  });

  /* ================= NEWSLETTER ================= */
  const btn = document.querySelector('.btn-nl');

  if (btn) {
    btn.addEventListener('click', function () {
      const inp = document.querySelector('.nl-input');

      if (!inp) return;

      if (inp.value.includes('@')) {
        inp.value = '';
        this.textContent = 'Subscribed!';
        setTimeout(() => this.textContent = 'Subscribe', 3000);
      } else {
        inp.style.borderColor = '#ef4444';
        setTimeout(() => inp.style.borderColor = '', 2000);
      }
    });
  }

});
</script>
